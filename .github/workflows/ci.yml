name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend
        run: |
          cd backend
          pip install -e .[dev]
          # Tests that need numeric / chunking deps only — keep CI fast.
          pip install pytest numpy beautifulsoup4 lxml rank-bm25 pydantic pydantic-settings

      - name: Run tests
        run: |
          cd backend && python -m pytest ../tests -v

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/ tests/ scripts/

  widget-build:
    name: Widget build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: widget/package.json
      - run: cd widget && npm install && npm run build

  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package.json
      - run: cd dashboard && npm install && npm run build
