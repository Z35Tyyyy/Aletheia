name: evals

# The eval suite hits OpenAI for embeddings + answers + LLM-judge, so we
# don't run it on every PR. Triggered manually or on push to main. Posts
# the metric table to the commit as a comment.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "eval_questions.yaml"
      - "scripts/run_eval.py"
      - "scripts/seed_fastapi_docs.py"
      - ".github/workflows/evals.yml"
  workflow_dispatch:
    inputs:
      strategy:
        description: "Retrieval strategy (vector | hybrid | hybrid_rerank | all)"
        required: false
        default: "all"

jobs:
  run-eval:
    name: RAG eval
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://rag:rag@localhost:5432/rag
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      EMBEDDER_PROVIDER: openai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend
        run: |
          cd backend && pip install -e .

      - name: Apply schema
        run: |
          PGPASSWORD=rag psql -h localhost -U rag -d rag -f backend/migrations/001_init.sql

      - name: Seed corpus (FastAPI docs)
        run: python scripts/seed_fastapi_docs.py

      - name: Run eval
        id: eval
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          ARGS="--git-sha $GIT_SHA"
          if [ "${{ github.event.inputs.strategy }}" != "" ] && [ "${{ github.event.inputs.strategy }}" != "all" ]; then
            ARGS="$ARGS --strategy ${{ github.event.inputs.strategy }}"
          fi
          python scripts/run_eval.py $ARGS | tee eval-results.md

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval-results.md

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = "## Eval results\n\n" + fs.readFileSync("eval-results.md", "utf8");
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body,
            });
